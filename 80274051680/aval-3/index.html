<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <title>GameZone</title>
            <link rel="stylesheet" href="style.css">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
            <body>

                <header>
                        <h1>🎮 <span class="destaque">GameZone</span></h1>
                                <p>Os melhores <span class="destaque">jogos</span> em um só lugar</p>

                                        <nav>
                                                    <ul>
                                                                    <li><a href="#"><span>Início</span></a></li>
                                                                                    <li><a href="#"><span>Jogos</span></a></li>
                                                                                                    <li><a href="#"><span>Categorias</span></a></li>
                                                                                                                    <li><a href="#"><span>Contato</span></a></li>
                                                                                                                                </ul>
                                                                                                                                        </nav>
                                                                                                                                            </header>

                                                                                                                                                <main>
                                                                                                                                                        <section class="games">

                                                                                                                                                                    <div class="card">
                                                                                                                                                                                    <img src="https://via.placeholder.com/200x120" alt="CyberRush X">
                                                                                                                                                                                                    <h2><span>CyberRush X</span></h2>
                                                                                                                                                                                                                    <p><span>Corridas futuristas</span> em alta velocidade!</p>
                                                                                                                                                                                                                                    <button onclick="jogarCyberRush()">Jogar</button>
                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                            <div class="card">
                                                                                                                                                                                                                                                                            <img src="https://via.placeholder.com/200x120" alt="Shadow Battle">
                                                                                                                                                                                                                                                                                            <h2><span>Shadow Battle</span></h2>
                                                                                                                                                                                                                                                                                                            <p>Lute nas <span>sombras</span> e vença!</p>
                                                                                                                                                                                                                                                                                                                            <button onclick="jogarShadow()">Jogar</button>
                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                    <div class="card">
                                                                                                                                                                                                                                                                                                                                                                    <img src="https://via.placeholder.com/200x120" alt="Mind Puzzle Pro">
                                                                                                                                                                                                                                                                                                                                                                                    <h2><span>Mind Puzzle Pro</span></h2>
                                                                                                                                                                                                                                                                                                                                                                                                    <p>Desafie sua <span>inteligência</span>!</p>
                                                                                                                                                                                                                                                                                                                                                                                                                    <button onclick="jogarPuzzle()">Jogar</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                        </section>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </main>

                                                                                                                                                                                                                                                                                                                                                                                                                                                <footer>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p>© 2026 <span class="destaque">GameZone</span></p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                            </footer>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script src="script.js"></script></body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
