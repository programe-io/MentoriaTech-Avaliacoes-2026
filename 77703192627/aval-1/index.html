<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Now</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>
    <div class="container">
        <h1>Clima Now</h1>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Digite a cidade...">
            <button id="search-btn">Buscar</button>
        </div>

        <div id="weather-data" class="hide">
            <h2 id="city"></h2>
            <p id="temp"><span></span>°C</p>
            <div id="description-container">
                <p id="description"></p>
                <img src="" alt="Condições climáticas" id="weather-icon">
            </div>
            <div class="details">
                <p id="humidity">Umidade: <span></span>%</p>
                <p id="wind">Vento: <span></span>km/h</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
