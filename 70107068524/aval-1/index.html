<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Caixa Eletrônico</title>
<link href="style.css" rel="stylesheet"></head>
<body>

    <h2>Caixa Eletrônico</h2>

    <input type="password" id="senha" placeholder="Digite sua senha">
    <button onclick="validarSenha()">Entrar</button>

    <p id="mensagem"></p>

    <script>
        const senhaCorreta = "7810";
        let tentativasRestantes = 3;

        function validarSenha() {
            const input = document.getElementById("senha");
            const mensagem = document.getElementById("mensagem");
            const tentativa = input.value;

            if (tentativasRestantes <= 0) {
                mensagem.textContent = "Acesso bloqueado!";
                return;
            }

            if (tentativa === senhaCorreta) {
                mensagem.textContent = "Bem-vindo! Acesso permitido.";
            } else {
                tentativasRestantes--;

                if (tentativasRestantes > 0) {
                    mensagem.textContent = "Senha incorreta! Tentativas restantes: " + tentativasRestantes;
                } else {
                    mensagem.textContent = "Acesso bloqueado! Você esgotou as tentativas.";
                }
            }

            input.value = "";
            input.focus();
        }
    </script>

<script src="script.js"></script></body>
</html>
