<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>QuantumTrade Pro - Platform</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>
    <div class="app-wrapper">
        <nav class="side-bar">
            <div class="logo">Q</div>
            <div class="asset active">EUR/USD</div>
            <div class="asset">BTC/USDT</div>
            <div class="asset">ETH/USD</div>
        </nav>

        <main class="chart-area">
            <div class="price-header">
                <h1 id="asset-name">EUR/USD</h1>
                <span id="live-price">1.09243</span>
            </div>
            <canvas id="mainChart"></canvas>
        </main>

        <aside class="trade-panel">
            <div class="control-box">
                <label>Tempo de Expiração</label>
                <input type="time" id="expiry-time" value="14:30">
                
                <label>Valor do Investimento</label>
                <div class="amount-input">
                    <button onclick="adjustAmount(-10)">-</button>
                    <input type="number" id="invest-amount" value="100">
                    <button onclick="adjustAmount(10)">+</button>
                </div>

                <div class="payout-info">
                    <span>Rendimento</span>
                    <span class="payout-percent">87%</span>
                </div>

                <button class="trade-btn up" onclick="app.executeTrade('CALL')">
                    <span class="icon">▲</span> ACIMA
                </button>
                <button class="trade-btn down" onclick="app.executeTrade('PUT')">
                    <span class="icon">▼</span> ABAIXO
                </button>
            </div>
        </aside>
    </div>
    <script src="app.js"></script>
<script src="script.js"></script></body>
</html>
