<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>
    <div class="converter-container">
        <h1>Conversor de Moedas</h1>
        
        <div class="input-group">
            <label for="amount">Valor a converter:</label>
            <input type="number" id="amount" placeholder="R$ 0,00" step="0.01">
        </div>

        <div class="selection-group">
            <select id="fromCurrency">
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="BTC">Bitcoin (BTC)</option>
            </select>
            <span>para</span>
            <select id="toCurrency">
                <option value="BRL" selected>Real Brasileiro (BRL)</option>
            </select>
        </div>

        <button id="convertBtn">Converter agora</button>

        <div id="resultArea" class="hidden">
            <p id="resultText"></p>
            <small id="updateTime"></small>
        </div>
    </div>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
