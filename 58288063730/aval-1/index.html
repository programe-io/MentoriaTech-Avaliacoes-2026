<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo da Velha</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
      background: #f2f2f2;
    }

    h1 {
      margin-bottom: 20px;
    }

    #tabuleiro {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 5px;
    }

    .casa {
      width: 100px;
      height: 100px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      border: 2px solid #333;
    }

    .casa:hover {
      background: #ddd;
    }

    #status {
      margin-top: 20px;
      font-size: 1.2rem;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="style.css" rel="stylesheet"></head>
<body>

  <h1>Jogo da Velha</h1>

  <div id="tabuleiro"></div>

  <div id="status">Vez do jogador: X</div>
  <button onclick="reiniciar()">Reiniciar</button>

  <script>
    const tabuleiro = document.getElementById("tabuleiro");
    const status = document.getElementById("status");

    let jogador = "X";
    let jogoAtivo = true;
    let casas = ["", "", "", "", "", "", "", "", ""];

    function criarTabuleiro() {
      tabuleiro.innerHTML = "";
      casas.forEach((valor, index) => {
        const div = document.createElement("div");
        div.classList.add("casa");
        div.textContent = valor;
        div.addEventListener("click", () => jogar(index));
        tabuleiro.appendChild(div);
      });
    }

    function jogar(index) {
      if (casas[index] !== "" || !jogoAtivo) return;

      casas[index] = jogador;
      verificarVencedor();
      jogador = jogador === "X" ? "O" : "X";
      atualizarStatus();
      criarTabuleiro();
    }

    function atualizarStatus() {
      if (jogoAtivo) {
        status.textContent = "Vez do jogador: " + jogador;
      }
    }

    function verificarVencedor() {
      const combinacoes = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
      ];

      for (let combinacao of combinacoes) {
        const [a, b, c] = combinacao;
        if (casas[a] && casas[a] === casas[b] && casas[a] === casas[c]) {
          status.textContent = "Jogador " + jogador + " venceu!";
          jogoAtivo = false;
          return;
        }
      }

      if (!casas.includes("")) {
        status.textContent = "Empate!";
        jogoAtivo = false;
      }
    }

    function reiniciar() {
      casas = ["", "", "", "", "", "", "", "", ""];
      jogador = "X";
      jogoAtivo = true;
      status.textContent = "Vez do jogador: X";
      criarTabuleiro();
    }

    criarTabuleiro();
  </script>

<script src="script.js"></script></body>
</html>
