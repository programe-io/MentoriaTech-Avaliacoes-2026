<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booyah Timer - Treinamento FF</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <div class="card-ff">
        
        <header>
            <h1 class="titulo-gamer">BOOYAH!</h1>
            <p id="status" class="badge">MODO: TREINO DE ELITE</p>
        </header>

        <div class="timer-container">
            <div class="timer">
                <span id="minutes">25</span>
                <span class="divisor">:</span>
                <span id="seconds">00</span>
            </div>
        </div>

        <div class="controles-gamer">
            <button id="start" class="btn btn-start" onclick="startTimer()">
                DROP (INICIAR)
            </button>
            
            <button id="pause" class="btn btn-pause" onclick="pauseTimer()">
                LOOT (PAUSAR)
            </button>
            
            <button id="reset" class="btn btn-reset" onclick="resetTimer()">
                REINICIAR MURAL
            </button>
        </div>

        <footer>
            <p>Prepare sua mira. O tempo está correndo!</p>
        </footer>
    </div>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
