<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Solar com Estrelas</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }

    /* Fundo estrelado */
    .stars {
        position: absolute;
        width: 100%;
        height: 100%;
        background: transparent;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: blink 2s infinite alternate;
    }

    @keyframes blink {
        from { opacity: 0.2; }
        to { opacity: 1; }
    }

    .solar-system {
        position: relative;
        width: 100vw;
        height: 100vh;
    }

    .sun {
        position: absolute;
        width: 100px;
        height: 100px;
        background: yellow;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 30px yellow;
    }

    .orbit {
        position: absolute;
        border: 1px dashed rgba(255,255,255,0.2);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: rotate linear infinite;
    }

    .planet {
        position: absolute;
        border-radius: 50%;
        top: 50%;
        left: 0;
        transform: translate(-50%, -50%);
    }

    @keyframes rotate {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Planetas */
    .mercury-orbit { width: 150px; height: 150px; animation-duration: 5s; }
    .mercury { width: 10px; height: 10px; background: gray; }

    .venus-orbit { width: 200px; height: 200px; animation-duration: 8s; }
    .venus { width: 15px; height: 15px; background: orange; }

    .earth-orbit { width: 260px; height: 260px; animation-duration: 12s; }
    .earth { width: 16px; height: 16px; background: blue; }

    .mars-orbit { width: 320px; height: 320px; animation-duration: 18s; }
    .mars { width: 14px; height: 14px; background: red; }
</style>
<link href="style.css" rel="stylesheet"></head>
<body>

<!-- Estrelas -->
<div class="stars">
    <!-- várias estrelas -->
    <div class="star" style="top:10%; left:20%;"></div>
    <div class="star" style="top:30%; left:70%;"></div>
    <div class="star" style="top:50%; left:40%;"></div>
    <div class="star" style="top:80%; left:10%;"></div>
    <div class="star" style="top:60%; left:90%;"></div>
    <div class="star" style="top:15%; left:85%;"></div>
    <div class="star" style="top:75%; left:60%;"></div>
    <div class="star" style="top:25%; left:35%;"></div>
    <div class="star" style="top:90%; left:50%;"></div>
    <div class="star" style="top:45%; left:15%;"></div>
</div>

<!-- Sistema Solar -->
<div class="solar-system">
    <div class="sun"></div>

    <div class="orbit mercury-orbit">
        <div class="planet mercury"></div>
    </div>

    <div class="orbit venus-orbit">
        <div class="planet venus"></div>
    </div>

    <div class="orbit earth-orbit">
        <div class="planet earth"></div>
    </div>

    <div class="orbit mars-orbit">
        <div class="planet mars"></div>
    </div>
</div>

<script src="script.js"></script></body>
</html>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
