<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriControl - Saúde e Digestão</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

<div class="main-container">
    <header>
        <h1>NutriControl 🍎</h1>
        <nav>
            <button onclick="showTab('calorias')">Calorias</button>
            <button onclick="showTab('digestao')">Digestão</button>
        </nav>
    </header>

    <section id="calorias" class="tab-content active">
        <h2>Calculadora de Calorias (TMB)</h2>
        <div class="input-group">
            <label>Sexo:</label>
            <select id="gender">
                <option value="m">Masculino</option>
                <option value="f">Feminino</option>
            </select>
        </div>
        <div class="input-group">
            <label>Peso (kg):</label>
            <input type="number" id="cal-weight" placeholder="Ex: 80">
        </div>
        <div class="input-group">
            <label>Idade:</label>
            <input type="number" id="cal-age" placeholder="Ex: 25">
        </div>
        <button class="btn-main" onclick="calculateCalories()">Calcular Necessidade Diária</button>
        <div id="cal-result" class="result"></div>
    </section>

    <section id="digestao" class="tab-content">
        <h2>Controle de Digestão</h2>
        <p>Registre como você se sentiu após a última refeição:</p>
        <div class="input-group">
            <label>Refeição:</label>
            <input type="text" id="meal-name" placeholder="Ex: Almoço">
        </div>
        <div class="input-group">
            <label>Sensação:</label>
            <select id="digestion-status">
                <option value="Ótima - Leve">Ótima - Leve ✨</option>
                <option value="Normal">Normal 👍</option>
                <option value="Estufado - Lento">Estufado - Lento 🎈</option>
                <option value="Azia/Desconforto">Azia/Desconforto ⚠️</option>
            </select>
        </div>
        <button class="btn-main" onclick="addDigestionLog()">Salvar Registro</button>
        
        <ul id="digestion-list">
            </ul>
    </section>
</div>

<script src="script.js"></script>
<script src="script.js"></script></body>
</html>
