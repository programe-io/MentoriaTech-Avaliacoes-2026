<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hydro Buddy</title>
    <style>
        :root {
            --primary: #00a8ff;
            --dark: #2f3640;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        .water-icon { font-size: 50px; color: var(--primary); }
        h1 { color: var(--dark); font-size: 1.5rem; }
        .timer { font-size: 2rem; font-weight: bold; margin: 1rem 0; color: var(--primary); }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #0097e6; transform: scale(1.05); }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

<div class="card">
    <div class="water-icon">💧</div>
    <h1>Smart Hydro</h1>
    <p>Próximo gole em:</p>
    <div class="timer" id="timer">60:00</div>
    <button onclick="resetTimer()">Bebi água!</button>
</div>

<script>
    let timeLeft = 3600; // 60 minutos em segundos
    const timerElement = document.getElementById('timer');

    function updateTimer() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 0) {
            alert("Hora de beber água!");
            resetTimer();
        } else {
            timeLeft--;
        }
    }

    function resetTimer() {
        timeLeft = 3600;
        updateTimer();
    }

    // Atualiza o timer a cada 1 segundo
    setInterval(updateTimer, 1000);
</script>

<script src="script.js"></script></body>
</html>
