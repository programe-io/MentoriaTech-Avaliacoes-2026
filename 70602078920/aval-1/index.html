<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Caixa Eletrônico</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <h2>Login do Caixa Eletrônico</h2>
    
    <button onclick="validarSenha()">Inserir Senha</button>

    <p id="mensagem"></p>

    <script>
        function validarSenha() {
            let senhaCorreta = "1234";
            let tentativa;
            let tentativasRestantes = 3;

            do {
                tentativa = prompt("Digite sua senha:");

                if (tentativa === senhaCorreta) {
                    document.getElementById("mensagem").innerText = "Bem-vindo! Acesso permitido.";
                    return;
                } else {
                    tentativasRestantes--;

                    if (tentativasRestantes > 0) {
                        alert("Senha incorreta! Tentativas restantes: " + tentativasRestantes);
                    }
                }

            } while (tentativasRestantes > 0);

            document.getElementById("mensagem").innerText = "Acesso bloqueado! Número máximo de tentativas excedido.";
        }
    </script>

<script src="script.js"></script></body>
</html>
