<!DOCTYPE html><html lang="pt-BR">
    <head>
      <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>FocusMusic - Música para Estudar</title>
            <style>
                body {
                      margin: 0;
                            font-family: Arial, sans-serif;
                                  background: #0f172a;
                                        color: #fff;
                                            }header {
                                              background: #1e293b;
                                                padding: 15px;
                                                  text-align: center;
                                                    font-size: 24px;
                                                      font-weight: bold;
                                                      }

                                                      nav {
                                                        display: flex;
                                                          justify-content: center;
                                                            gap: 20px;
                                                              background: #334155;
                                                                padding: 10px;
                                                                }

                                                                nav button {
                                                                  background: #0ea5e9;
                                                                    border: none;
                                                                      padding: 10px 15px;
                                                                        color: white;
                                                                          cursor: pointer;
                                                                            border-radius: 5px;
                                                                            }

                                                                            .container {
                                                                              padding: 20px;
                                                                              }

                                                                              .card {
                                                                                background: #1e293b;
                                                                                  margin: 15px 0;
                                                                                    padding: 15px;
                                                                                      border-radius: 10px;
                                                                                      }

                                                                                      footer {
                                                                                        text-align: center;
                                                                                          padding: 15px;
                                                                                            background: #1e293b;
                                                                                              margin-top: 20px;
                                                                                              }

                                                                                                </style>
                                                                                                <script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
                                                                                                <body><header>🎧 FocusMusic - Estude com Música</header><nav>
                                                                                                  <button onclick="mostrarCategoria('lofi')">Lofi</button>
                                                                                                    <button onclick="mostrarCategoria('classica')">Clássica</button>
                                                                                                      <button onclick="mostrarCategoria('natureza')">Sons da Natureza</button>
                                                                                                      </nav><div class="container" id="conteudo"></div><footer>
                                                                                                        Desenvolvido para ajudar nos estudos 📚
                                                                                                        </footer><script>
                                                                                                          const dados = {
                                                                                                              lofi: [
                                                                                                                    {
                                                                                                                            titulo: "Lofi Chill",
                                                                                                                                    motivo: "Ajuda na concentração e reduz ansiedade."
                                                                                                                                          }
                                                                                                                                              ],
                                                                                                                                                  classica: [
                                                                                                                                                        {
                                                                                                                                                                titulo: "Mozart para estudar",
                                                                                                                                                                        motivo: "Estimula o cérebro e melhora a memória."
                                                                                                                                                                              }
                                                                                                                                                                                  ],
                                                                                                                                                                                      natureza: [
                                                                                                                                                                                            {
                                                                                                                                                                                                    titulo: "Chuva relaxante",
                                                                                                                                                                                                            motivo: "Diminui o estresse e melhora o foco."
                                                                                                                                                                                                                  }
                                                                                                                                                                                                                      ]
                                                                                                                                                                                                                        };

                                                                                                                                                                                                                          function mostrarCategoria(cat) {
                                                                                                                                                                                                                              const conteudo = document.getElementById('conteudo');
                                                                                                                                                                                                                                  conteudo.innerHTML = '';

                                                                                                                                                                                                                                      dados[cat].forEach(item => {
                                                                                                                                                                                                                                            conteudo.innerHTML += `
                                                                                                                                                                                                                                                    <div class="card">
                                                                                                                                                                                                                                                              <h2>${item.titulo}</h2>
                                                                                                                                                                                                                                                                        <p><strong>Motivo:</strong> ${item.motivo}</p>
                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                      `;
                                                                                                                                                                                                                                                                                          });
                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                            </script><script src="script.js"></script></body>
                                                                                                                                                                                                                                                                                            </html>
