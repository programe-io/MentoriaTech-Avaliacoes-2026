<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <title>Meu Blog Games</title>
            <link rel="stylesheet" href="style.css">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
            <body>

                <h1>🎮 Meu Blog Games</h1>

                    <div class="container">
                            <!-- Imagem principal -->
                                    <img src="https://upload.wikimedia.org/wikipedia/en/e/e1/Spider-Man_PS4_cover.jpg" alt="Homem-Aranha">

                                            <!-- Texto -->
                                                    <div class="texto">
                                                                <h2>Homem-Aranha</h2>
                                                                            <p>
                                                                                            Homem-Aranha é uma aventura cheia de ação onde você controla um herói
                                                                                                            com habilidades incríveis, como escalar paredes e lançar teias.
                                                                                                                            Enfrente vilões e proteja a cidade de Nova York.
                                                                                                                                        </p>

                                                                                                                                                    <button onclick="mostrarImagens()">Ver Imagens</button>
                                                                                                                                                            </div>
                                                                                                                                                                </div>

                                                                                                                                                                    <!-- Galeria -->
                                                                                                                                                                        <div id="galeria" class="galeria">
                                                                                                                                                                                <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1817070/ss_1.jpg">
                                                                                                                                                                                        <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1817070/ss_2.jpg">
                                                                                                                                                                                                <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1817070/ss_3.jpg">
                                                                                                                                                                                                    </div>

                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                function mostrarImagens() {
                                                                                                                                                                                                                            let galeria = document.getElementById("galeria");

                                                                                                                                                                                                                                        if (galeria.style.display === "none" || galeria.style.display === "") {
                                                                                                                                                                                                                                                        galeria.style.display = "block";
                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                    galeria.style.display = "none";
                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                            </script>

                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                            </html>
