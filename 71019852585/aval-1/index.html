<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caixa Eletrônico - Validação</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>
    <div class="atm-container">
        <h2>Banco Digital</h2>
        <div id="visor">Digite sua senha</div>
        <input type="password" id="senhaInput" maxlength="4" readonly>
        
        <div class="teclado">
            <button onclick="addNumero(2)">2</button>
            <button onclick="addNumero(3)">3</button>
            <button onclick="addNumero(1)">1</button>
            <button onclick="addNumero(6)">6</button>
            </div>

        <div class="controles">
            <button class="btn-limpar" onclick="limpar()">Limpar</button>
            <button class="btn-confirmar" onclick="validarSenha()">Confirmar</button>
        </div>
        
        <p id="tentativas">Tentativas restantes: 3</p>
    </div>
    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
