<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            color: white;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 24px;
        }

        header p {
            font-size: 14px;
            color: #ccc;
        }

        section {
            margin-top: 15px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.9);
            color: #333;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-cadastrar {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
        }

        .btn-limpar {
            background: #888;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }

        .contador {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
        }

        .obs {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

<body>

<main>

    <header>
        <h1>🎓 Cadastro de Alunos</h1>
        <p>Sistema simples e funcional</p>
    </header>

    <form id="formAluno">

        <section>
            <label>👤 Nome</label>
            <input type="text" id="nome" required>
        </section>

        <section>
            <label>🎂 Idade</label>
            <input type="number" id="idade" required>
        </section>

        <section class="buttons">
            <button type="submit" class="btn-cadastrar">✅ Cadastrar</button>
            <button type="reset" class="btn-limpar">🧹 Limpar</button>
        </section>

    </form>

    <div class="contador">
        Total de alunos cadastrados: <strong id="total">0</strong>
    </div>

    <div class="obs">
        ⚠️ <strong>Observação importante:</strong><br>
        Os alunos cadastrados ficam salvos neste navegador.  
        Não apague os dados do navegador para não perder os registros.
    </div>

    <footer>
        Projeto Escolar
    </footer>

</main>

<script>
    const form = document.getElementById("formAluno");
    const total = document.getElementById("total");

    let alunos = JSON.parse(localStorage.getItem("alunos")) || [];

    function atualizarTotal() {
        total.textContent = alunos.length;
    }

    atualizarTotal();

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const nome = document.getElementById("nome").value;
        const idade = document.getElementById("idade").value;

        const aluno = {
            nome,
            idade
        };

        alunos.push(aluno);

        localStorage.setItem("alunos", JSON.stringify(alunos));

        atualizarTotal();

        alert("Aluno cadastrado com sucesso!");

        form.reset();
    });
</script>

<script src="script.js"></script></body>
</html>
<form id="formAluno">
    <strong id="total">0</strong>
