<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de cadastro de alunos">
    <meta name="author" content="Seu Nome">
    <title>Cadastro de Alunos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fa;
            color: #333;
        }

        header {
            background: #0077cc;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #005fa3;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        fieldset {
            border: 2px solid #0077cc;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        legend {
            font-weight: bold;
            color: #0077cc;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="submit"], input[type="reset"] {
            background: #0077cc;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #005fa3;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th {
            background: #0077cc;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        footer {
            background: #0077cc;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="style.css" rel="stylesheet"></head>

<body>

<header>
    <h1>Cadastro de Alunos</h1>
    <p>Sistema escolar</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Cadastro</a>
    <a href="#">Lista</a>
    <a href="#">Contato</a>
</nav>

<main>

<section>

    <h2>Formulário de Cadastro</h2>

    <form action="#" method="post">

        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="data">Data de Nascimento:</label>
            <input type="date" id="data" name="data">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email">

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone">

            <label>Gênero:</label>
            <input type="radio" name="genero" value="masculino"> Masculino
            <input type="radio" name="genero" value="feminino"> Feminino

        </fieldset>

        <fieldset>
            <legend>Endereço</legend>

            <label for="rua">Rua:</label>
            <input type="text" id="rua" name="rua">

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" name="cidade">

            <label for="estado">Estado:</label>
            <select id="estado" name="estado">
                <option value="">Selecione</option>
                <option>MA</option>
                <option>SP</option>
                <option>RJ</option>
                <option>MG</option>
            </select>

        </fieldset>

        <fieldset>
            <legend>Curso</legend>

            <label for="curso">Escolha o curso:</label>
            <select id="curso" name="curso">
                <option>Informática</option>
                <option>Administração</option>
                <option>Enfermagem</option>
            </select>

            <label for="turno">Turno:</label>
            <select id="turno" name="turno">
                <option>Manhã</option>
                <option>Tarde</option>
                <option>Noite</option>
            </select>

        </fieldset>

        <fieldset>
            <legend>Outras Informações</legend>

            <label>
                <input type="checkbox" name="termos"> Aceito os termos
            </label>

            <label for="obs">Observações:</label>
            <textarea id="obs" name="obs" rows="4"></textarea>

        </fieldset>

        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">

    </form>

</section>

<section>

    <h2>Lista de Alunos</h2>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Curso</th>
                <th>Turno</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>João Silva</td>
                <td>Informática</td>
                <td>Manhã</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">Total de alunos: 1</td>
            </tr>
        </tfoot>
    </table>

</section>

</main>

<footer>
    <p>&copy; 2026 - Sistema Escolar</p>
</footer>

</body>
</html>
