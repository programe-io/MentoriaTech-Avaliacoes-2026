<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- META -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de estoque">
    <meta name="author" content="Aluno">

    <title>Cadastro de Produtos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* NAV */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 10px;
        }

        nav ul {
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style: none;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* CARD */
        main {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 {
            font-weight: bold;
        }

        section {
            margin-top: 10px;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 10px;
            border: none;
            background: #222;
            color: white;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        button[type="reset"] {
            background: #555;
        }

        aside {
            display: none; /* não bagunça o layout */
        }

        footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

<body>

<!-- NAV -->
<nav>
    <ul>
        <li><a href="#">🏠 Início</a></li>
        <li><a href="#">📦 Produtos</a></li>
        <li><a href="#">➕ Cadastro</a></li>
        <section>
</section>
    </ul>
</nav>

<!-- MAIN -->
<main>
    <!-- HEADER -->
    <header>
        <h1><strong>📦 Cadastro de Produtos</strong></h1>
        <p><small>Sistema simples de estoque</small></p>
        <section>
    <h3></h3>
</section>
        <section>
</section>
        <section>
</section>
    </header>

    <!-- ARTICLE -->
    <article>

        <!-- FORM -->
        <form>

            <!-- FIELDSET -->
            <fieldset>
                <legend>Dados</legend>

                <section>
                    <label>Nome</label>
                    <input type="text" required>
                </section>

                <section>
                    <label>Código</label>
                    <input type="text" required>
                </section>

                <section>
                    <label>Quantidade</label>
                    <input type="number" required>
                </section>

                <section>
                    <label>Preço</label>
                    <input type="number" step="0.01">
                </section>

                <section>
                    <label>Categoria</label>
                    <select>
                        <optgroup label="Tipos">
                            <option>Eletrônicos</option>
                            <option>Alimentos</option>
                            <option>Roupas</option>
                        </optgroup>
                    </select>
                </section>

                <section>
                    <label>Descrição</label>
                    <textarea rows="3"></textarea>
                </section>

            </fieldset>

            <!-- BUTTONS -->
            <section class="buttons">
                <button type="submit">Cadastrar</button>
                <button type="reset">Limpar</button>
            </section>

        </form>

    </article>

    <!-- ASIDE (escondido mas presente) -->
    <aside>
        <details>
            <summary>Info</summary>
            <p><mark>Dados salvos no navegador</mark></p>
        </details>

        <ul>
            <li>Item</li>
        </ul>

        <ol>
            <li>Passo</li>
        </ol>

        <figure>
            <img src="" alt="">
            <figcaption>Imagem</figcaption>
        </figure>

        <progress value="50" max="100"></progress>
        <meter value="0.5"></meter>
    </aside>

    <!-- FOOTER -->
    <footer>
        <p>&copy; <time>2026</time> Sistema</p>
    </footer>

</main>
<section>
    
</section>
</body>
</html>
