<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Eletrônico - Validação de Senha</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>
    <div class="container">
        <div class="atm">
            <h1>🏧 Caixa Eletrônico</h1>
            
            <div id="tela" class="tela">
                <p id="mensagem">Digite sua senha de 4 dígitos</p>
                
                <input type="password" 
                       id="senhaInput" 
                       maxlength="4" 
                       placeholder="••••"
                       autocomplete="off">
                
                <div class="tentativas">
                    Tentativas restantes: <span id="tentativasRestantes">3</span>
                </div>
                
                <button onclick="validarSenha()">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
