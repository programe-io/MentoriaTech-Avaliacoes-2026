<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha Pro</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <div class="container">
        <h1>Gerador de Senhas</h1>
        
        <div class="result-container">
            <span id="password">P4ssw0rd!</span>
            <button id="copy">Copiar</button>
        </div>

        <div class="settings">
            <div class="setting">
                <label>Tamanho da senha</label>
                <input type="number" id="length" min="4" max="20" value="12">
            </div>
            <div class="setting">
                <label>Incluir Maiúsculas</label>
                <input type="checkbox" id="uppercase" checked>
            </div>
            <div class="setting">
                <label>Incluir Números</label>
                <input type="checkbox" id="numbers" checked>
            </div>
            <div class="setting">
                <label>Incluir Símbolos</label>
                <input type="checkbox" id="symbols" checked>
            </div>
        </div>

        <button id="generate" class="btn-large">Gerar Senha</button>
    </div>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
