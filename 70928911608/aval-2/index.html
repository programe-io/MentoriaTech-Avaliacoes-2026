<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar Completo</title>

    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Sistema Escolar Completo</h1>
        <p>Exemplo de HTML com estrutura semântica completa</p>
    </header>

    <!-- NAV -->
    <nav>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Alunos</a></li>
            <li><a href="#">Notas</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <!-- MAIN -->
    <main>

        <!-- SECTION PRINCIPAL -->
        <section class="container">

            <article>
                <h2>Cadastro de Aluno</h2>

                <!-- FORMULÁRIO -->
                <form>

                    <label for="nome">Nome:</label>
                    <input type="text" id="nome">

                    <label for="idade">Idade:</label>
                    <input type="number" id="idade">

                    <label for="nota">Nota:</label>
                    <input type="number" id="nota">

                    <label for="opcao">Opção:</label>
                    <select id="opcao">
                        <option value="1">Ver Situação</option>
                        <option value="2">Ver Categoria</option>
                    </select>

                    <button type="button" onclick="executar()">Executar</button>

                </form>

                <p id="resultado"></p>
            </article>

        </section>

        <!-- ASIDE -->
        <aside>
            <h3>Dicas</h3>
            <p>Digite dados válidos para obter resultados corretos.</p>

            <figure>
                <img src="https://via.placeholder.com/150" alt="Imagem ilustrativa">
                <figcaption>Exemplo ilustrativo do sistema</figcaption>
            </figure>
        </aside>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 - Sistema Escolar Completo</p>
        <p>Desenvolvido com HTML, CSS e JavaScript</p>
    </footer>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

<script src="script.js"></script></body>

</html>
