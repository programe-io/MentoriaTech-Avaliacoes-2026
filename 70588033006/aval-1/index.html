
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Introdução à Lógica com JS</title>
  <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

  <h1>Desafios de Lógica 🧠</h1>

  <div class="container">
    <h2>1. Soma de dois números</h2>
    <input type="number" id="num1" placeholder="Número 1">
    <input type="number" id="num2" placeholder="Número 2">
    <button onclick="somar()">Somar</button>
    <p id="resultadoSoma"></p>
  </div>

  <div class="container">
    <h2>2. Número Par ou Ímpar</h2>
    <input type="number" id="numeroPar" placeholder="Digite um número">
    <button onclick="verificarPar()">Verificar</button>
    <p id="resultadoPar"></p>
  </div>

  <div class="container">
    <h2>3. Média de notas</h2>
    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <button onclick="calcularMedia()">Calcular</button>
    <p id="resultadoMedia"></p>
  </div>

  <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
