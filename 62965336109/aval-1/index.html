<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Completo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        h1 {
            color: #4CAF50;
        }

        p {
            font-size: 1.1em;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="style.css" rel="stylesheet"></head>
<body>

<header>
    <h1>Bem-vindo ao Meu Site</h1>
</header>

<main>
    <h2>Sobre Mim</h2>
    <p>Este é um site de exemplo feito em HTML, CSS e JavaScript. Você pode personalizá-lo como quiser!</p>
    
    <h2>Imagem Exemplo</h2>
    <img src="https://via.placeholder.com/600x300" alt="Imagem Exemplo">

    <h2>Links</h2>
    <p>Visite o <a href="https://www.google.com" target="_blank">Google</a> para mais informações.</p>

    <h2>Interatividade</h2>
    <button onclick="mostrarMensagem()">Clique Aqui</button>
    <p id="mensagem"></p>
</main>

<footer>
    &copy; 2026 Meu Site Completo
</footer>

<script>
    function mostrarMensagem() {
        document.getElementById('mensagem').textContent = "Você clicou no botão!";
    }
</script>

<script src="script.js"></script></body>
</html>
