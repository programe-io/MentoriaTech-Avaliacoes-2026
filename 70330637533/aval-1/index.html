<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPurpleBooks | Avaliações</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <header>
        <h1> Pausa & Prosa</h1>
        <p>Sua estante digital de opiniões</p>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Nova Avaliação</h2>
            <form id="book-form">
                <input type="text" id="title" placeholder="Título do Livro" required>
                <input type="text" id="author" placeholder="Autor(a)" required>
                <input type="number" id="rating" placeholder="Nota (0-5)" min="0" max="5" step="0.5" required>
                <textarea id="review" placeholder="O que você achou?" rows="3" required></textarea>
                <button type="submit">Adicionar à Estante</button>
            </form>
        </section>

        <hr>

        <section class="reviews-display">
            <h2>Minhas Leituras</h2>
            <div id="books-container" class="books-grid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
