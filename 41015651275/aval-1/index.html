c<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Algoritmos de Filmes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #111;
            color: #eee;
        }
        h1, h2 {
            color: #ffcc00;
        }
        .filme {
            border: 1px solid #444;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            background-color: #222;
        }
        button {
            padding: 10px;
            background-color: #ffcc00;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="style.css" rel="stylesheet"></head>
<body>

    <h1>Algoritmo de Recomendação de Filmes</h1>

    <p>Este exemplo mostra um algoritmo simples que recomenda filmes com base na nota.</p>

    <h2>Lista de Filmes</h2>
    <div id="listaFilmes"></div>

    <button onclick="recomendar()">Recomendar Filmes</button>

    <h2>Recomendados</h2>
    <div id="recomendados"></div>

    <script>
        const filmes = [
            { titulo: "Interestelar", nota: 9 },
            { titulo: "Velozes e Furiosos", nota: 6 },
            { titulo: "A Origem", nota: 9 },
            { titulo: "Crepúsculo", nota: 5 }
        ];

        function mostrarFilmes() {
            const lista = document.getElementById("listaFilmes");
            lista.innerHTML = "";
            filmes.forEach(filme => {
                lista.innerHTML += `<div class="filme">${filme.titulo} - Nota: ${filme.nota}</div>`;
            });
        }

        function recomendar() {
            const recomendados = filmes.filter(f => f.nota >= 8);
            const area = document.getElementById("recomendados");
            area.innerHTML = "";

            recomendados.forEach(f => {
                area.innerHTML += `<div class="filme">${f.titulo}</div>`;
            });
        }

        mostrarFilmes();
    </script>

<script src="script.js"></script></body>
</html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Busca de Filmes</title>
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
input { padding:10px; width:60%; margin:20px; border-radius:5px; }
.filme { background:#222; margin:10px; padding:10px; border-radius:8px; }
</style>
</head>
<body>

<h1>🔎 Buscar Filmes</h1>
<input type="text" id="busca" placeholder="Digite um filme..." onkeyup="buscar()">

<div id="resultado"></div>

<script>
const filmes = ["Interestelar", "A Origem", "Batman", "Vingadores"];

function buscar() {
    const termo = document.getElementById("busca").value.toLowerCase();
    const resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    const filtrados = filmes.filter(f => f.toLowerCase().includes(termo));

    filtrados.forEach(f => {
        resultado.innerHTML += `<div class="filme">${f}</div>`;
    });
}
</script>

</body>

<script>
const filmes = [
    {titulo:"Vingadores", genero:"Ação"},
    {titulo:"Titanic", genero:"Romance"},
    {titulo:"Interestelar", genero:"Ficção"}
];

function filtrar(genero) {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const resultado = filmes.filter(f => f.genero === genero);

    resultado.forEach(f => {
        lista.innerHTML += `<div class="filme">${f.titulo}</div>`;
    });
}
</script>
