<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>
  <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #555;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background: #777;
        }

        .container {
            padding: 20px;
        }

        .section {
            background: white;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: #eee;
            padding: 15px;
            border-radius: 8px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 20px;
        }

        form input, form textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
        }

        form button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
        }

        form button:hover {
            background: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>Meu Site Completo</h1>
    <p></p>
</header>

<nav>
    <a href="#home">Início</a>
    <a href="#sobre">Sobre</a>
   

<div class="container">

    <section id="home" class="section">
        <h2>SOBRE</h2>
        <p>ANIMES</p>
    </section>

    <section id="sobre" class="section">
        <h2>Sobre</h2>
        <p>Este site foi criado como um exemplo de HTML com várias seções.</p>
        <ul>
            <li>HTML estruturado</li>
            <li>CSS básico</li>
            <li></li>
        </ul>
    </section>

   

  
  
</body>
</html>
