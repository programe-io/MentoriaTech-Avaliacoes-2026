<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Master Dev Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>
    <div class="container">
        <header>
            <h1>🚀 My Task Manager</h1>
            <p id="date-display"></p>
        </header>

        <section class="input-section">
            <input type="text" id="task-input" placeholder="O que precisa ser feito?">
            <select id="priority-select">
                <option value="low">Baixa</option>
                <option value="medium">Média</option>
                <option value="high">Alta</option>
            </select>
            <button id="add-btn">Adicionar</button>
        </section>

        <nav class="filters">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendentes</button>
            <button class="filter-btn" data-filter="completed">Concluídas</button>
        </nav>

        <main>
            <ul id="task-list"></ul>
        </main>

        <footer>
            <small>Total de tarefas: <span id="task-count">0</span></small>
            <button id="clear-all">Limpar Tudo</button>
        </footer>
    </div>
<script src="script.js"></script></body>
</html>
