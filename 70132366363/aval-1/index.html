<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM - Sistema Bancário</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <div class="atm-card">
        <div class="screen">
            <h1 id="title">BANCO NACIONAL</h1>
            <div id="display">
                <p id="msg">POR FAVOR, DIGITE SUA SENHA</p>
                <p id="tries-count">Tentativas restantes: 3</p>
            </div>
            <input type="password" id="passwordInput" maxlength="4" placeholder="****">
        </div>
        
        <div class="keypad">
            <button class="btn-confirm" onclick="validarSenha()">CONFIRMAR</button>
            <button class="btn-clear" onclick="limpar()">LIMPAR</button>
        </div>
    </div>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
