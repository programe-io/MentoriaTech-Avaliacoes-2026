<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Pro</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <div class="container">
        <h2>Dashboard Financeiro</h2>

        <div class="cards">
            <div class="card">
                <h3>Entradas</h3>
                <p id="incomeDisplay">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Saídas</h3>
                <p id="expenseDisplay">R$ 0,00</p>
            </div>
            <div class="card total">
                <h3>Total</h3>
                <p id="totalDisplay">R$ 0,00</p>
            </div>
        </div>

        <form id="form">
            <input type="hidden" id="editIndex" value="">
            
            <input type="text" id="description" placeholder="Descrição" required>
            <input type="number" id="amount" step="0.01" placeholder="Valor (Ex: -50)" required>
            
            <select id="category">
                <option value="Geral">Geral</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Lazer">Lazer</option>
                <option value="Trabalho">Trabalho</option>
            </select>

            <button type="submit" id="btn-save">Adicionar</button>
            <button type="button" id="btn-cancel" style="display:none;" onclick="Form.clear()">Cancelar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
