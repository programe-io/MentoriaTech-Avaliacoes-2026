<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Pro</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>
    <div class="container">
        <h1>Jogo da Velha</h1>
        
        <div class="scoreboard">
            <div class="score">Jogador X: <span id="score-x">0</span></div>
            <div class="score">Jogador O: <span id="score-o">0</span></div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
        </div>

        <div class="message-container hide" id="message-container">
            <p id="message-text"></p>
            <button id="restart-btn">Novo Jogo</button>
        </div>
    </div>
    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
