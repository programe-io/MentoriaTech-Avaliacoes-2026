<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site de Músicas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #121212;
      color: #fff;
    }

    header {
      background: #1db954;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      text-align: center;
    }

    .card h3 {
      margin: 10px 0;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #000;
      margin-top: 20px;
    }
  </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

<header>🎵 Meu Site de Músicas</header>

<div class="container">

  <div class="card">
    <h3>Até Você Voltar</h3>
    <p>Henrique & Juliano</p>
    <audio controls>
      <source src="musicas/ate-voce-voltar.mp3" type="audio/mpeg">
      Seu navegador não suporta áudio.
    </audio>
  </div>

  <div class="card">
    <h3>Fim ou Intervalo</h3>
    <p>Henrique & Juliano</p>
    <audio controls>
      <source src="musicas/fim-ou-intervalo.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="card">
    <h3>Seja Ex</h3>
    <p>Matheus & Kauan</p>
    <audio controls>
      <source src="musicas/seja-ex.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="card">
    <h3>Ele Quer Ser Eu</h3>
    <p>Murilo Huff</p>
    <audio controls>
      <source src="musicas/ele-quer-ser-eu.mp3" type="audio/mpeg">
    </audio>
  </div>

</div>

<footer>
  © 2026 - Site de Música
</footer>

<script src="script.js"></script></body>
</html>
