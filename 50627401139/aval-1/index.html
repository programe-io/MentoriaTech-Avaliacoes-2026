<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASCOM - Portal Católico</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b1e3c;
    color: white;
}

/* HEADER */
header {
    background: linear-gradient(135deg,#0a2a66,#1e40af);
    padding: 20px;
    text-align: center;
}

/* MENU */
.menu {
    display: flex;
    justify-content: space-around;
    background: #1e3a8a;
    padding: 10px;
}

.menu button {
    background: none;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* SEÇÕES */
.section {
    display: none;
    padding: 20px;
}
.active { display: block; }

/* CARDS */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    cursor: pointer;
}

/* SANTOS */
.santos img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* VELA */
.vela {
    font-size: 50px;
    text-align: center;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.8);
    width: 100%;
    height: 100%;
}

.modal-content {
    background: #1e293b;
    padding: 20px;
    margin: 10% auto;
    width: 80%;
    border-radius: 10px;
}

/* BOTÃO */
.btn {
    background: #3b82f6;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

<body>

<header>
    <h1>✝ PASCOM</h1>
    <p>Portal Católico Completo</p>
</header>

<div class="menu">
    <button onclick="show('liturgia')">Liturgia</button>
    <button onclick="show('oracoes')">Orações</button>
    <button onclick="show('santos')">Santos</button>
    <button onclick="show('velas')">Velas</button>
</div>

<!-- LITURGIA REAL -->
<div id="liturgia" class="section active">
    <div class="card">
        <h2>📖 Liturgia do Dia</h2>
        <p id="liturgiaTexto">Carregando liturgia...</p>
    </div>
</div>

<!-- ORAÇÕES -->
<div id="oracoes" class="section">

<div class="card" onclick="abrirOracao('pai')">🙏 Pai Nosso</div>
<div class="card" onclick="abrirOracao('ave')">🙏 Ave Maria</div>
<div class="card" onclick="abrirOracao('credo')">🙏 Credo</div>

</div>

<!-- SANTOS -->
<div id="santos" class="section santos">

<div class="card" onclick="abrirSanto('francisco')">
São Francisco de Assis
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/San_Francisco_de_Asis_%28Zurbar%C3%A1n%29.jpg">
</div>

<div class="card" onclick="abrirSanto('teresinha')">
Santa Teresinha do Menino Jesus
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Saint_Therese_of_Lisieux.jpg">
</div>

<div class="card" onclick="abrirSanto('antonio')">
Santo Antônio de Pádua
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Saint_Anthony_of_Padua.jpg">
</div>

</div>

<!-- VELAS -->
<div id="velas" class="section">
    <div class="card">
        <h2>🕯️ Acenda sua vela</h2>
        <div class="vela" onclick="acender(this)">🕯️</div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <p id="texto"></p>
        <button class="btn" onclick="fechar()">Fechar</button>
    </div>
</div>

<script>

/* MENU */
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* LITURGIA REAL */
async function carregarLiturgia(){
    try{
        let res = await fetch("https://liturgia.up.railway.app/");
        let d = await res.json();

        document.getElementById("liturgiaTexto").innerHTML =
        `<b>${d.data}</b><br><br>
        <b>1ª Leitura:</b><br>${d.primeiraLeitura.texto}<br><br>
        <b>Salmo:</b><br>${d.salmo.texto}<br><br>
        <b>Evangelho:</b><br>${d.evangelho.texto}`;
    }catch{
        document.getElementById("liturgiaTexto").innerText="Erro ao carregar liturgia.";
    }
}
carregarLiturgia();

/* ORAÇÕES COMPLETAS */
function abrirOracao(tipo){
let t="";

if(tipo=="pai"){
t=`
<b>Pai Nosso</b><br><br>
Pai nosso que estais no céu,<br>
santificado seja o vosso nome;<br>
venha a nós o vosso reino;<br>
seja feita a vossa vontade,<br>
assim na terra como no céu.<br><br>

O pão nosso de cada dia nos dai hoje;<br>
perdoai-nos as nossas ofensas,<br>
assim como nós perdoamos a quem nos tem ofendido;<br>
e não nos deixeis cair em tentação,<br>
mas livrai-nos do mal.<br><br>

Amém.
`;
}

if(tipo=="ave"){
t=`
<b>Ave Maria</b><br><br>
Ave Maria, cheia de graça,<br>
o Senhor é convosco,<br>
bendita sois vós entre as mulheres,<br>
e bendito é o fruto do vosso ventre, Jesus.<br><br>

Santa Maria, Mãe de Deus,<br>
rogai por nós, pecadores,<br>
agora e na hora da nossa morte.<br><br>

Amém.
`;
}

if(tipo=="credo"){
t=`
<b>Credo</b><br><br>
Creio em Deus Pai todo-poderoso,<br>
Criador do céu e da terra;<br>
e em Jesus Cristo, seu único Filho, nosso Senhor;<br><br>

Creio no Espírito Santo,<br>
na Santa Igreja Católica,<br>
na comunhão dos santos,<br>
na remissão dos pecados,<br>
na ressurreição da carne,<br>
na vida eterna.<br><br>

Amém.
`;
}

abrirModal(t);
}

/* SANTOS */
function abrirSanto(nome){
let t="";

if(nome=="francisco"){
t="São Francisco de Assis: viveu na pobreza e amou toda a criação de Deus.";
}

if(nome=="teresinha"){
t="Santa Teresinha: ensinou a pequena via do amor e confiança em Deus.";
}

if(nome=="antonio"){
t="Santo Antônio: grande pregador e intercessor dos necessitados.";
}

abrirModal(t);
}

/* VELA */
function acender(el){
el.innerText="🔥";
}

/* MODAL */
function abrirModal(t){
document.getElementById("texto").innerHTML=t;
document.getElementById("modal").style.display="block";
}

function fechar(){
document.getElementById("modal").style.display="none";
}

</script>

<script src="script.js"></script></body>
</html>
