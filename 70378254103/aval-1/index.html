<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caixa Eletrônico</title>

<style>
    body {
            font-family: Arial, sans-serif;
                    background-color: #1e1e2f;
                            color: white;
                                    display: flex;
                                            justify-content: center;
                                                    align-items: center;
                                                            height: 100vh;
                                                                }

                                                                    .container {
                                                                            background-color: #2c2c3e;
                                                                                    padding: 30px;
                                                                                            border-radius: 10px;
                                                                                                    text-align: center;
                                                                                                            width: 300px;
                                                                                                                    box-shadow: 0 0 10px rgba(0,0,0,0.5);
                                                                                                                        }

                                                                                                                            input {
                                                                                                                                    width: 100%;
                                                                                                                                            padding: 10px;
                                                                                                                                                    margin-top: 10px;
                                                                                                                                                            border: none;
                                                                                                                                                                    border-radius: 5px;
                                                                                                                                                                            font-size: 16px;
                                                                                                                                                                                }

                                                                                                                                                                                    button {
                                                                                                                                                                                            margin-top: 15px;
                                                                                                                                                                                                    padding: 10px;
                                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                                                    border: none;
                                                                                                                                                                                                                            border-radius: 5px;
                                                                                                                                                                                                                                    background-color: #4CAF50;
                                                                                                                                                                                                                                            color: white;
                                                                                                                                                                                                                                                    font-size: 16px;
                                                                                                                                                                                                                                                            cursor: pointer;
                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                    button:hover {
                                                                                                                                                                                                                                                                            background-color: #45a049;
                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                    .mensagem {
                                                                                                                                                                                                                                                                                            margin-top: 15px;
                                                                                                                                                                                                                                                                                                    font-weight: bold;
                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                        <script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                        <div class="container">
                                                                                                                                                                                                                                                                                                            <h2>Caixa Eletrônico</h2>
                                                                                                                                                                                                                                                                                                                <p>Digite sua senha</p>
                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                        <input type="password" id="senha" maxlength="4" placeholder="****">
                                                                                                                                                                                                                                                                                                                            <button onclick="verificarSenha()">Entrar</button>
                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                    <div class="mensagem" id="mensagem"></div>
                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                                                                                                                                        let senhaCorreta = "4321";
                                                                                                                                                                                                                                                                                                                                            let tentativasRestantes = 3;

                                                                                                                                                                                                                                                                                                                                                function verificarSenha() {
                                                                                                                                                                                                                                                                                                                                                        let tentativa = document.getElementById("senha").value;
                                                                                                                                                                                                                                                                                                                                                                let mensagem = document.getElementById("mensagem");

                                                                                                                                                                                                                                                                                                                                                                        if (tentativasRestantes <= 0) {
                                                                                                                                                                                                                                                                                                                                                                                    mensagem.textContent = "Acesso bloqueado!";
                                                                                                                                                                                                                                                                                                                                                                                                return;
                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                if (tentativa === senhaCorreta) {
                                                                                                                                                                                                                                                                                                                                                                                                                            mensagem.textContent = "Bem-vindo! Acesso liberado.";
                                                                                                                                                                                                                                                                                                                                                                                                                                        mensagem.style.color = "lightgreen";
                                                                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            tentativasRestantes--;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (tentativasRestantes > 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        mensagem.textContent = "Senha incorreta! Tentativas restantes: " + tentativasRestantes;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        mensagem.style.color = "orange";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    mensagem.textContent = "Acesso bloqueado! Número máximo de tentativas excedido.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    mensagem.style.color = "red";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("senha").value = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="script.js"></script></body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
