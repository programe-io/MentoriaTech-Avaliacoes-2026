<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Link com JavaScript</title>
<link href="style.css" rel="stylesheet"></head>
<body>

    <h1>Link criado com JavaScript</h1>

    <script>
        // Criando o elemento <a>
        const link = document.createElement("a");

        // Definindo o destino do link
        link.href = "https://www.google.com";

        // Texto que aparece na página
        link.textContent = "Clique aqui para acessar o Google";

        // Abrir em nova aba
        link.target = "_blank";

        // Adicionando o link no corpo da página
        document.body.appendChild(link);
    </script>

<script src="script.js"></script></body>
</html>
