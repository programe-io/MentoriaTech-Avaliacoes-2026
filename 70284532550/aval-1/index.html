<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mentoria Tech</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
    }

    .menu {
      width: 250px;
      background: #1e293b;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .menu button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      background: #334155;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .menu button:hover {
      background: #0d6efd;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 8px;
      margin-top: 10px;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
      color: green;
    }
  </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link href="style.css" rel="stylesheet"></head>
<body>

<header>
  <h1>Mentoria Tech 🚀</h1>
</header>

<div class="container">

  <div class="menu">
    <button onclick="carregarModulo(1)">1.01 Introdução</button>
    <button onclick="carregarModulo(2)">1.02 Variáveis</button>
    <button onclick="carregarModulo(3)">1.03 Operadores</button>
  </div>

  <div class="content">
    <div class="box" id="conteudo">
      <h2>Bem-vindo!</h2>
      <p>Selecione um módulo ao lado.</p>
    </div>
  </div>

</div>

<script>
function carregarModulo(modulo) {
  const conteudo = document.getElementById("conteudo");

  if (modulo === 1) {
    conteudo.innerHTML = `
      <h2>1.01 Introdução à Lógica de Programação</h2>
      <p>Lógica de programação é a forma de pensar para resolver problemas com código.</p>
      <p>JavaScript é uma linguagem usada para criar interatividade em sites.</p>
    `;
  }

  if (modulo === 2) {
    conteudo.innerHTML = `
      <h2>1.02 Variáveis e Tipos de Dados</h2>
      <p>Variáveis armazenam valores.</p>

      <input type="text" id="nome" placeholder="Digite seu nome">
      <button onclick="mostrarNome()">Salvar</button>

      <div class="result" id="resultadoNome"></div>
    `;
  }

  if (modulo === 3) {
    conteudo.innerHTML = `
      <h2>1.03 Operadores Aritméticos</h2>
      <p>Faça uma soma:</p>

      <input type="number" id="n1" placeholder="Número 1">
      <input type="number" id="n2" placeholder="Número 2">
      <button onclick="somar()">Somar</button>

      <div class="result" id="resultadoSoma"></div>
    `;
  }
}

function mostrarNome() {
  const nome = document.getElementById("nome").value;
  document.getElementById("resultadoNome").innerText = "Olá, " + nome;
}

function somar() {
  const n1 = Number(document.getElementById("n1").value);
  const n2 = Number(document.getElementById("n2").value);
  const resultado = n1 + n2;

  document.getElementById("resultadoSoma").innerText = "Resultado: " + resultado;
}
</script>

<script src="script.js"></script></body>
</html>
