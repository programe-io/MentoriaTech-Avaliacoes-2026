<!DOCTYPE html><html lang="pt-BR">
    <head>
      <meta charset="UTF-8">
        <title>Jogo - Pegue o Quadrado</title>
          <style>
              body {
                    font-family: Arial, sans-serif;
                          text-align: center;
                                background: #f0f0f0;
                                    }
                                        #gameArea {
                                              width: 300px;
                                                    height: 300px;
                                                          margin: 20px auto;
                                                                background: white;
                                                                      border: 2px solid #333;
                                                                            position: relative;
                                                                                  overflow: hidden;
                                                                                      }
                                                                                          #square {
                                                                                                width: 40px;
                                                                                                      height: 40px;
                                                                                                            background: red;
                                                                                                                  position: absolute;
                                                                                                                        cursor: pointer;
                                                                                                                            }
                                                                                                                                #score {
                                                                                                                                      font-size: 20px;
                                                                                                                                            margin-top: 10px;
                                                                                                                                                }
                                                                                                                                                  </style>
                                                                                                                                                  <script src="https://cdn.tailwindcss.com"></script>
<link href="style.css" rel="stylesheet"></head>
                                                                                                                                                  <body><h1>Pegue o Quadrado!</h1>
                                                                                                                                                  <p>Clique no quadrado vermelho o mais rápido possível!</p><div id="gameArea">
                                                                                                                                                    <div id="square"></div>
                                                                                                                                                    </div><div id="score">Pontuação: 0</div><script>
                                                                                                                                                      const square = document.getElementById("square");
                                                                                                                                                        const gameArea = document.getElementById("gameArea");
                                                                                                                                                          const scoreDisplay = document.getElementById("score");

                                                                                                                                                            let score = 0;

                                                                                                                                                              function moveSquare() {
                                                                                                                                                                  const maxX = gameArea.clientWidth - square.clientWidth;
                                                                                                                                                                      const maxY = gameArea.clientHeight - square.clientHeight;

                                                                                                                                                                          const x = Math.random() * maxX;
                                                                                                                                                                              const y = Math.random() * maxY;

                                                                                                                                                                                  square.style.left = x + "px";
                                                                                                                                                                                      square.style.top = y + "px";
                                                                                                                                                                                        }

                                                                                                                                                                                          square.addEventListener("click", () => {
                                                                                                                                                                                              score++;
                                                                                                                                                                                                  scoreDisplay.textContent = "Pontuação: " + score;
                                                                                                                                                                                                      moveSquare();
                                                                                                                                                                                                        });

                                                                                                                                                                                                          // Move automaticamente a cada 1 segundo
                                                                                                                                                                                                            setInterval(moveSquare, 1000);

                                                                                                                                                                                                              // posição inicial
                                                                                                                                                                                                                moveSquare();
                                                                                                                                                                                                                </script><script src="script.js"></script></body>
                                                                                                                                                                                                                </html>
