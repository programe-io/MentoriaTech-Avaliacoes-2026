<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Feed</title>
  <link href="./output.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

<body class="bg-gradient-to-b from-blue-900 to-blue-950 min-h-screen text-white">

  <!-- HEADER -->
  <header class="shadow-md p-5 flex items-center">
    <div class="flex-1 text-center md:text-left uppercase font-bold tracking-wider">
      LOGO
    </div>
    <nav class="font-bold gap-6 hidden md:flex">
      <a href="#" class="hover:text-blue-400">Início</a>
      <a href="#" class="hover:text-blue-400">Amigos</a>
      <a href="#" class="hover:text-blue-400">Perfil</a>
    </nav>
  </header>

  <!-- POSTS -->
  <main class="p-8 flex flex-col md:flex-row justify-center gap-6">

    <!-- POST CARD 1 -->
    <div class="bg-gray-800 rounded-lg shadow-md overflow-hidden max-w-xs">
      <!-- CARD HEADER -->
      <div class="flex items-center gap-3 p-4">
        <img class="h-12 w-12 rounded-full border-2 border-blue-500" src="images/profile_01.jpg" alt="">
        <h2 class="text-lg font-semibold">FroJho</h2>
      </div>
      <!-- CARD IMAGE -->
      <img class="w-full h-48 object-cover" src="https://images.ecycle.com.br/wp-content/uploads/2023/09/10123212/sol.jpg.webp" alt="">
      <!-- CARD CONTENT -->
      <div class="p-4">
        <p class="text-sm text-justify">
          imagem do sol 
        </p>
        <span class="text-xs text-gray-400 block text-right mt-3">há 18 minutos</span>
      </div>
    </div>

    <!-- POST CARD 2 -->
    <div class="bg-gray-800 rounded-lg shadow-md overflow-hidden max-w-xs">
      <div class="flex items-center gap-3 p-4">
        <img class="h-12 w-12 rounded-full border-2 border-blue-500" src="images/profile_01.jpg" alt="">
        <h2 class="text-lg font-semibold">FroJho</h2>
      </div>
      <img class="w-full h-48 object-cover" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQW3dGRs_eiiNXBbdB4uB3Yg0P7MF27Sqawsg&s" alt="">
      <div class="p-4">
        <p class="text-sm text-justify">
          imagem de Uma Floresta
        </p>
        <span class="text-xs text-gray-400 block text-right mt-3">há 12 minutos</span>
      </div>
    </div>

    <!-- POST CARD 3 -->
    <div class="bg-gray-800 rounded-lg shadow-md overflow-hidden max-w-xs">
      <div class="flex items-center gap-3 p-4">
        <img class="h-12 w-12 rounded-full border-2 border-blue-500" src="images/profile_01.jpg" alt="">
        <h2 class="text-lg font-semibold">FroJho</h2>
      </div>
      <img class="w-full h-48 object-cover" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxmdUmo-7O02mHM-TWVIUBRqs4Et4vArZEhw&s" alt="">
      <div class="p-4">
        <p class="text-sm text-justify">
          Imagem da Lua
        </p>
        <span class="text-xs text-gray-400 block text-right mt-3">há 16 minutos</span>
      </div>
    </div>

  </main>

</body>
</html>
