<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Médio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #555;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

<header>
    <h1>Meu Site</h1>
    <p>JOGOS</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Bem-vindo</h2>
        <p>Esse é um Site :]</p>
        <button onclick="mostrarMensagem()">Clique aqui</button>
    </div>

    <div class="card">
        <h2>Lista de jogos</h2>
        <ul id="lista">
            <li>Minecraft</li>
            <li>Blood Strick</li>
        </ul>
        <button onclick="adicionarItem()">Adicionar Item</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 - Meu Site</p>
</footer>

<script>
    function mostrarMensagem() {
        alert("Você clicou no botão!");
    }

    function adicionarItem() {
        const lista = document.getElementById("lista");
        const novoItem = document.createElement("li");
        novoItem.textContent = "Novo item";
        lista.appendChild(novoItem);
    }
</script>

</body>
</html>
