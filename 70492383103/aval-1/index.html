<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <title>Meu Blog Games</title>
            <link rel="stylesheet" href="style.css">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
            <body>

                <h1>🎮 Meu Blog Games</h1>

                    <div class="container">
                            <!-- Imagem principal -->
                                    <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437b5" alt="Jogo">

                                            <!-- Texto -->
                                                    <div class="texto">
                                                                <h2>Devil May Cry 5</h2>
                                                                            <p>
                                                                                            Devil May Cry 5 é um jogo de ação com combates rápidos e estilosos.
                                                                                                            Você enfrenta demônios usando habilidades incríveis e combos insanos.
                                                                                                                        </p>

                                                                                                                                    <button onclick="mostrarImagens()">Ver Imagens</button>
                                                                                                                                            </div>
                                                                                                                                                </div>

                                                                                                                                                    <!-- Galeria -->
                                                                                                                                                        <div id="galeria" class="galeria">
                                                                                                                                                                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
                                                                                                                                                                        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
                                                                                                                                                                                <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8">
                                                                                                                                                                                    </div>

                                                                                                                                                                                        <script>
                                                                                                                                                                                                function mostrarImagens() {
                                                                                                                                                                                                            let galeria = document.getElementById("galeria");

                                                                                                                                                                                                                        if (galeria.style.display === "none" || galeria.style.display === "") {
                                                                                                                                                                                                                                        galeria.style.display = "block";
                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                    galeria.style.display = "none";
                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                            </script>

                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                            </html>
