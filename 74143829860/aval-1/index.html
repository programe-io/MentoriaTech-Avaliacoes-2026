<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Incrível</title>
    <style>
        /* Um pouco de CSS para não ficar básico demais */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
    </style>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <div class="container">
        <h1>Bem-vindo ao meu site!</h1>
        <p>Este é um exemplo de estrutura HTML básica, mas funcional.</p>
        
        <ul>
            <li>Item de lista 1</li>
            <li>Item de lista 2</li>
            <li>Item de lista 3</li>
        </ul>

        <button onclick="saudacao()">Clique aqui!</button>
    </div>

    <script>
        // Um toque de JavaScript para interatividade
        function saudacao() {
            alert('Olá! O código está funcionando perfeitamente.');
        }
    </script>

<script src="script.js"></script></body>
</html>
