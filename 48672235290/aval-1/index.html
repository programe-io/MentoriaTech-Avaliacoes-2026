<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Robô em HTML</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #222;
  }

  .robo {
    position: relative;
  }

  .cabeca {
    width: 120px;
    height: 100px;
    background: #999;
    border-radius: 10px;
    position: relative;
    margin: 0 auto;
  }

  .olho {
    width: 20px;
    height: 20px;
    background: #00f;
    border-radius: 50%;
    position: absolute;
    top: 30px;
  }

  .olho.esquerdo { left: 25px; }
  .olho.direito { right: 25px; }

  .corpo {
    width: 140px;
    height: 150px;
    background: #777;
    margin: 10px auto;
    border-radius: 10px;
  }

  .braco {
    width: 30px;
    height: 100px;
    background: #aaa;
    position: absolute;
    top: 110px;
  }

  .braco.esquerdo { left: -35px; }
  .braco.direito { right: -35px; }

  .pernas {
    display: flex;
    justify-content: space-between;
    width: 100px;
    margin: 0 auto;
  }

  .perna {
    width: 30px;
    height: 80px;
    background: #555;
    border-radius: 5px;
  }
</style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="style.css" rel="stylesheet"></head>

<body>

<div class="robo">
  <div class="cabeca">
    <div class="olho esquerdo"></div>
    <div class="olho direito"></div>
  </div>

  <div class="corpo"></div>

  <div class="braco esquerdo"></div>
  <div class="braco direito"></div>

  <div class="pernas">
    <div class="perna"></div>
    <div class="perna"></div>
  </div>
</div>

<script src="script.js"></script></body>
</html>
