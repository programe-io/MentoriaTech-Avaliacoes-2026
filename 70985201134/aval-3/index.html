<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Cultura Local</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <header>
        <img src="https://cdn-icons-png.flaticon.com/512/826/826070.png" alt="Logo" style="width: 40px;">
        <h1>Portal da Nossa Cultura</h1>
        <nav>
            <a href="#">Início</a> | <a href="#">Culinária</a> | <a href="#">Tradições</a>
        </nav>
    </header>

    <div class="container-geral">
        <main>
            <article class="post-principal">
                <img src="https://images.unsplash.com/photo-1623053424172-88d447d7c674?q=80&w=800" alt="Serra" class="imagem-principal">
                <h2>Nossa Natureza</h2>
                <p>A serra é o símbolo da nossa região. <span class="destaque">Preservar é um dever de todos.</span></p>
            </article>

            <aside class="barra-lateral">
                <h3>Dicionário Local</h3>
                <p>Expressões que usamos aqui: <span>Uai, Bah, Égua!</span></p>
            </aside>

            <section class="contato">
                <h2>Fale Conosco</h2>
                <form action="#">
                    <div class="campo-form">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" placeholder="Seu nome">
                    </div>
                    
                    <div class="campo-form">
                        <label for="msg">Mensagem:</label>
                        <textarea id="msg" placeholder="Sua sugestão"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-enviar">Enviar Sugestão</button>
                </form>
            </section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 - Cultura Local</p>
    </footer>

</body>
</html>
