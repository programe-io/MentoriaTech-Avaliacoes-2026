<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Social Feed</title>
        <link href="./output.css" rel="stylesheet">

          <style>
              .card:hover {
                    transform: translateY(-5px);
                          transition: 0.3s;
                              }
                                </style>
                                <script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

                                <body class="bg-gradient-to-b from-blue-900 to-blue-950 min-h-screen text-white">

                                  <!-- HEADER -->
                                    <header class="shadow-md p-5 flex items-center">
                                        <div class="flex-1 text-center uppercase font-bold tracking-wider">
                                              LOGO
                                                  </div>
                                                    </header>

                                                      <!-- POSTS -->
                                                        <main class="p-6 flex flex-col gap-6 items-center">

                                                            <!-- CARD 1 -->
                                                                <div class="card bg-gray-800 rounded-lg shadow-md overflow-hidden max-w-xs w-full">
                                                                      <div class="flex items-center gap-3 p-4">
                                                                              <img class="h-12 w-12 rounded-full border-2 border-blue-500" 
                                                                                      src="https://picsum.photos/100?random=1">
                                                                                              <h2 class="text-lg font-semibold">Post 1</h2>
                                                                                                    </div>

                                                                                                          <img class="w-full h-48 object-cover hover:scale-105 transition duration-300"
                                                                                                                src="https://picsum.photos/400/300?random=1">

                                                                                                                      <div class="p-4">
                                                                                                                              <p class="text-sm mb-3">
                                                                                                                                        Primeiro post com interação!
                                                                                                                                                </p>

                                                                                                                                                        <div class="flex justify-between">
                                                                                                                                                                  <button onclick="curtir(this)" class="text-red-400">
                                                                                                                                                                              ❤️ <span>0</span>
                                                                                                                                                                                        </button>
                                                                                                                                                                                                  <button onclick="comentar()" class="text-blue-400">
                                                                                                                                                                                                              💬 comentar
                                                                                                                                                                                                                        </button>
                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                        <span class="text-xs text-gray-400 block text-right mt-3">agora</span>
                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                      <!-- CARD 2 -->
                                                                                                                                                                                                                                                          <div class="card bg-gray-800 rounded-lg shadow-md overflow-hidden max-w-xs w-full">
                                                                                                                                                                                                                                                                <div class="flex items-center gap-3 p-4">
                                                                                                                                                                                                                                                                        <img class="h-12 w-12 rounded-full border-2 border-blue-500" 
                                                                                                                                                                                                                                                                                src="https://picsum.photos/100?random=2">
                                                                                                                                                                                                                                                                                        <h2 class="text-lg font-semibold">Post 2</h2>
                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                    <img class="w-full h-48 object-cover hover:scale-105 transition duration-300"
                                                                                                                                                                                                                                                                                                          src="https://picsum.photos/400/300?random=2">

                                                                                                                                                                                                                                                                                                                <div class="p-4">
                                                                                                                                                                                                                                                                                                                        <p class="text-sm mb-3">
                                                                                                                                                                                                                                                                                                                                  Segundo post com curtidas!
                                                                                                                                                                                                                                                                                                                                          </p>

                                                                                                                                                                                                                                                                                                                                                  <div class="flex justify-between">
                                                                                                                                                                                                                                                                                                                                                            <button onclick="curtir(this)" class="text-red-400">
                                                                                                                                                                                                                                                                                                                                                                        ❤️ <span>0</span>
                                                                                                                                                                                                                                                                                                                                                                                  </button>
                                                                                                                                                                                                                                                                                                                                                                                            <button onclick="comentar()" class="text-blue-400">
                                                                                                                                                                                                                                                                                                                                                                                                        💬 comentar
                                                                                                                                                                                                                                                                                                                                                                                                                  </button>
                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <span class="text-xs text-gray-400 block text-right mt-3">agora</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- CARD 3 -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="card bg-gray-800 rounded-lg shadow-md overflow-hidden max-w-xs w-full">
                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="flex items-center gap-3 p-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <img class="h-12 w-12 rounded-full border-2 border-blue-500" 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          src="https://picsum.photos/100?random=3">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <h2 class="text-lg font-semibold">Post 3</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <img class="w-full h-48 object-cover hover:scale-105 transition duration-300"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    src="https://picsum.photos/400/300?random=3">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="p-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <p class="text-sm mb-3">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Terceiro post com comentários!
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="flex justify-between">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <button onclick="curtir(this)" class="text-red-400">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ❤️ <span>0</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <button onclick="comentar()" class="text-blue-400">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  💬 comentar
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <span class="text-xs text-gray-400 block text-right mt-3">agora</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </main>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <!-- SCRIPT -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function curtir(btn) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      let span = btn.querySelector("span");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let count = parseInt(span.innerText);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  span.innerText = count + 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function comentar() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let texto = prompt("Digite seu comentário:");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if (texto) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              alert("Comentário enviado: " + texto);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </html>
