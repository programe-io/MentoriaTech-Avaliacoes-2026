<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa Eletrônico</title>
  <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

  <div id="atm-container">
    <!-- Tela principal do ATM -->
    <div id="atm-screen">
      <header id="bank-header">
        <div class="bank-logo">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="6" width="18" height="14" rx="2"/>
            <path d="M3 10h18"/>
            <path d="M8 14h.01"/>
            <path d="M16 14h.01"/>
          </svg>
        </div>
        <span class="bank-name">BANCO DIGITAL</span>
        <div class="status-dot"></div>
      </header>

      <main id="screen-content">
        <!-- Estado: Inserindo senha -->
        <div id="state-input" class="screen-state active">
          <p class="screen-label">DIGITE SUA SENHA</p>
          <div id="pin-dots" class="pin-dots">
            <span class="dot" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
            <span class="dot" data-index="3"></span>
          </div>
          <p id="feedback-msg" class="feedback-msg"></p>
          <div id="attempts-bar" class="attempts-bar">
            <span class="attempts-label">Tentativas restantes:</span>
            <div class="attempts-dots">
              <span class="attempt-dot active" data-att="1"></span>
              <span class="attempt-dot active" data-att="2"></span>
              <span class="attempt-dot active" data-att="3"></span>
            </div>
          </div>
        </div>

        <!-- Estado: Acesso permitido -->
        <div id="state-success" class="screen-state">
          <div class="success-icon-wrapper">
            <svg class="success-icon" viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="#00e676" stroke-width="2.5">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 12l3 3 5-6"/>
            </svg>
          </div>
          <p class="screen-label success-text">ACESSO PERMITIDO</p>
          <p class="welcome-msg">Bem-vindo ao seu banco!</p>
          <p class="welcome-sub">Carregando sua conta...</p>
        </div>

        <!-- Estado: Acesso bloqueado -->
        <div id="state-blocked" class="screen-state">
          <div class="blocked-icon-wrapper">
            <svg class="blocked-icon" viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="#ff1744" stroke-width="2.5">
              <rect x="3" y="11" width="18" height="10" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              <circle cx="12" cy="16" r="1" fill="#ff1744"/>
              <line x1="12" y1="17" x2="12" y2="19"/>
            </svg>
          </div>
          <p class="screen-label blocked-text">ACESSO BLOQUEADO</p>
          <p class="blocked-msg">Numero maximo de tentativas excedido.</p>
          <p class="blocked-sub">Procure sua agencia para desbloqueio.</p>
        </div>
      </main>
    </div>

    <!-- Teclado numérico -->
    <div id="keypad">
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key key-action" data-key="clear" aria-label="Limpar">C</button>
      <button class="key" data-key="0">0</button>
      <button class="key key-action" data-key="backspace" aria-label="Apagar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
          <line x1="18" y1="9" x2="12" y2="15"/>
          <line x1="12" y1="9" x2="18" y2="15"/>
        </svg>
      </button>
    </div>

    <footer id="atm-footer">
      <span>Para fins didaticos — senha: 2805</span>
    </footer>
  </div>

  <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
