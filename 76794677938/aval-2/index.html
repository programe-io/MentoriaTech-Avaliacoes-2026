<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            display: flex;
            gap: 20px;
        \}
        aside {
            width: 25%;
            background: #eee;
            padding: 15px;
            border-radius: 10px;
        \}
        main {
            width: 75%;
        \}
        article {
            background: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        \}
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        \}
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

<header>
    <h1>Bem-vindo à minha página</h1>
    
    <nav>
        <ul style="list-style: none; display: flex; justify-content: center; gap: 20px;">
            <li><a href="#sobre" style="color: white; text-decoration: none;">Sobre</a></li>
            <li><a href="#contato" style="color: white; text-decoration: none;">Contato</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    
    <aside>
        <h3>Barra Lateral</h3>
        <p>Links úteis:</p>
        <ul>
            <li><a href="#">Exemplo 1</a></li>
            <li><a href="#">Exemplo 2</a></li>
        </ul>
    </aside>

    <main>
        <section id="sobre">
            <h2>Sobre</h2>

            <article>
                <h3>Artigo com Imagem</h3>
                <p>Este artigo contém uma imagem de exemplo:</p>

                <img src="https://via.placeholder.com/400" alt="Imagem de exemplo">

            </article>

        </section>

        <section id="contato">
            <h2>Contato</h2>

            <article>
                <p>Email: exemplo@email.com</p>
            </article>

        </section>
    </main>

</div>

<footer>
    <p>&copy; 2026 Minha Página</p>
</footer>

<script src="script.js"></script>
<script src="script.js"></script></body>
