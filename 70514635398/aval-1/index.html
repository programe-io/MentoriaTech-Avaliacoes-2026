<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Caixa Eletrônico</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

  <h2>Simulação de Caixa Eletrônico</h2>
  <button onclick="validarSenha()">Inserir Senha</button>

  <script>
    function validarSenha() {
      let senhaCorreta = "6784";
      let tentativa;
      let tentativasRestantes = 3;

      do {
        tentativa = prompt("Digite a senha:");

        if (tentativa === senhaCorreta) {
          alert("Bem-vindo! Acesso permitido.");
          return; // encerra a função
        } else {
          tentativasRestantes--;

          if (tentativasRestantes > 0) {
            alert("Senha incorreta! Tentativas restantes: " + tentativasRestantes);
          } else {
            alert("Acesso bloqueado! Número máximo de tentativas excedido.");
          }
        }

      } while (tentativasRestantes > 0);
    }
  </script>

<script src="script.js"></script></body>
</html>
