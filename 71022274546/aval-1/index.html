<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Feed da Amiga</title>
        <link href="./output.css" rel="stylesheet">

          <style>
              body {
                    background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
                        }

                            .card {
                                  transition: 0.3s;
                                      }

                                          .card:hover {
                                                transform: scale(1.03);
                                                    }
                                                      </style>
                                                      <script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>

                                                      <body class="min-h-screen text-gray-800">

                                                        <!-- HEADER -->
                                                          <header class="p-5 text-center font-bold text-xl">
                                                              💖 Passeio 💖
                                                        
                                                                </header>

                                                                  <!-- POSTS -->
                                                                    <main class="p-6 flex flex-col gap-6 items-center">

                                                                        <!-- CARD 1 -->
                                                                            <div class="card bg-white rounded-2xl shadow-lg max-w-xs w-full overflow-hidden">
                                                                                  <img src="https://picsum.photos/400/300?random=11" class="w-full h-48 object-cover">

                                                                                        <div class="p-4">
                                                                                                <h2 class="font-bold text-lg mb-2">Dia especial ✨</h2>
                                                                                                        <p class="text-sm mb-3">Um momento lindo pra lembrar 💕</p>

                                                                                                                <div class="flex justify-between">
                                                                                                                          <button onclick="curtir(this)">❤️ <span>0</span></button>
                                                                                                                                    <button onclick="comentar()">💬</button>
                                                                                                                                            </div>
                                                                                                                                                  </div>
                                                                                                                                                      </div>

                                                                                                                                                          <!-- CARD 2 -->
                                                                                                                                                              <div class="card bg-white rounded-2xl shadow-lg max-w-xs w-full overflow-hidden">
                                                                                                                                                                    <img src="https://picsum.photos/400/300?random=12" class="w-full h-48 object-cover">

                                                                                                                                                                          <div class="p-4">
                                                                                                                                                                                  <h2 class="font-bold text-lg mb-2">Amizade 💖</h2>
                                                                                                                                                                                          <p class="text-sm mb-3">Momentos com quem faz tudo melhor!</p>

                                                                                                                                                                                                  <div class="flex justify-between">
                                                                                                                                                                                                            <button onclick="curtir(this)">❤️ <span>0</span></button>
                                                                                                                                                                                                                      <button onclick="comentar()">💬</button>
                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                            <!-- CARD 3 -->
                                                                                                                                                                                                                                                <div class="card bg-white rounded-2xl shadow-lg max-w-xs w-full overflow-hidden">
                                                                                                                                                                                                                                                      <img src="https://picsum.photos/400/300?random=13" class="w-full h-48 object-cover">

                                                                                                                                                                                                                                                            <div class="p-4">
                                                                                                                                                                                                                                                                    <h2 class="font-bold text-lg mb-2">Alegria 😊</h2>
                                                                                                                                                                                                                                                                            <p class="text-sm mb-3">Sorrir é sempre a melhor escolha!</p>

                                                                                                                                                                                                                                                                                    <div class="flex justify-between">
                                                                                                                                                                                                                                                                                              <button onclick="curtir(this)">❤️ <span>0</span></button>
                                                                                                                                                                                                                                                                                                        <button onclick="comentar()">💬</button>
                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                            </main>

                                                                                                                                                                                                                                                                                                                              <!-- SCRIPT -->
                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                    function curtir(btn) {
                                                                                                                                                                                                                                                                                                                                          let span = btn.querySelector("span");
                                                                                                                                                                                                                                                                                                                                                let count = parseInt(span.innerText);
                                                                                                                                                                                                                                                                                                                                                      span.innerText = count + 1;
                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                              function comentar() {
                                                                                                                                                                                                                                                                                                                                                                    let texto = prompt("Deixe um comentário 💬");
                                                                                                                                                                                                                                                                                                                                                                          if (texto) {
                                                                                                                                                                                                                                                                                                                                                                                  alert("Comentário: " + texto);
                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                              </script>

                                                                                                                                                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                                                                                                                                                              </html>
