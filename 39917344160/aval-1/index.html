<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Algoritmos no Futebol</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b6623;
            color: white;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #ffd700;
        }
        .box {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            width: 60%;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ffd700;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
<script src="https://cdn.tailwindcss.com"></script>
<link href="style.css" rel="stylesheet"></head>
<body>

    <h1>Algoritmos no Futebol ⚽</h1>

    <div class="box">
        <p>
            Algoritmos são usados no futebol para analisar desempenho de jogadores,
            prever resultados de partidas e auxiliar na tomada de decisões táticas.
        </p>
    </div>

    <div class="box">
        <h2>Exemplo: Cálculo de Aproveitamento</h2>
        <p>Clique no botão para calcular o aproveitamento de um time.</p>
        <button onclick="calcularAproveitamento()">Calcular</button>
        <p id="resultado"></p>
    </div>

    <script>
        function calcularAproveitamento() {
            let vitorias = 10;
            let empates = 5;
            let derrotas = 3;

            let jogos = vitorias + empates + derrotas;
            let pontos = (vitorias * 3) + (empates * 1);

            let aproveitamento = (pontos / (jogos * 3)) * 100;

            document.getElementById("resultado").innerHTML =
                "Aproveitamento: " + aproveitamento.toFixed(2) + "%";
        }
    </script>

<script src="script.js"></script></body>
</html>
