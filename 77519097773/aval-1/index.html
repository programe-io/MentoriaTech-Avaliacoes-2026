<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Estratégico</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet"></head>
<body>

    <div class="container">
        <h2>Controle Financeiro</h2>
        
        <div class="balance-container">
            <h4>Seu Saldo Total</h4>
            <h1 id="balance-value">R$ 0.00</h1>
        </div>

        <div class="summary-steps">
            <div class="step-box">
                <strong>Organizar</strong>
                <span id="total-organizar">R$ 0.00</span>
            </div>
            <div class="step-box">
                <strong>Dívidas</strong>
                <span id="total-dividas">R$ 0.00</span>
            </div>
            <div class="step-box">
                <strong>Emergência</strong>
                <span id="total-emergencia">R$ 0.00</span>
            </div>
            <div class="step-box">
                <strong>Investir</strong>
                <span id="total-investimento">R$ 0.00</span>
            </div>
        </div>

        <div class="form-control">
            <label for="desc">Descrição</label>
            <input type="text" id="desc" placeholder="Ex: Salário, Aluguel...">
            
            <label for="amount">Valor (positivo ou negativo)</label>
            <input type="number" id="amount" placeholder="Ex: 100 ou -50">

            <label for="category">Categoria Estratégica</label>
            <select id="category">
                <option value="Organizar Conta">Organizar Conta</option>
                <option value="Quitar Dívidas">Quitar Dívidas</option>
                <option value="Emergência">Reserva de Emergência</option>
                <option value="Investimento">Investimentos</option>
            </select>
            
            <button id="submit-btn" onclick="addTransaction()">Adicionar</button>
        </div>

        <h3>Histórico de Transações</h3>
        <ul id="transaction-list" class="list"></ul>
    </div>

    <script src="script.js"></script>
<script src="script.js"></script></body>
</html>
